<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Matching Engine — POC</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header>
    <h1>🎬 AI Matching Engine</h1>
    <p class="subtitle">Nhập brief → nhận shortlist ứng viên phù hợp nhất</p>
  </header>

  <main>
    <!-- ── Brief Input Form ── -->
    <section class="card" id="brief-form">
      <h2>Brief</h2>

      <label for="brief-text">Mô tả dự án</label>
      <textarea id="brief-text" rows="4"
        placeholder="VD: Chương trình thực tế dạng gameshow hài, cần đạo diễn dày dặn kinh nghiệm, phong cách nhanh vui, khán giả rộng…">
      </textarea>

      <div class="row">
        <div>
          <label for="genres">Thể loại</label>
          <input id="genres" type="text" placeholder="reality_tv, tvc, gameshow (phân cách bằng dấu phẩy)" />
        </div>
        <div>
          <label for="styles">Phong cách</label>
          <input id="styles" type="text" placeholder="fast_paced, comedic, cinematic…" />
        </div>
        <div>
          <label for="top-n">Số ứng viên</label>
          <input id="top-n" type="number" value="5" min="1" max="20" />
        </div>
      </div>

      <button id="match-btn" onclick="runMatch()">🔍 Tìm ứng viên</button>
    </section>

    <!-- ── Results ── -->
    <section id="results" class="hidden">
      <h2>Shortlist <span id="result-count"></span></h2>
      <div id="cards-container"></div>
    </section>

    <div id="loading" class="hidden">⏳ Đang phân tích…</div>
    <div id="error-msg" class="hidden error"></div>
  </main>

  <script src="app.js"></script>
</body>
</html>
